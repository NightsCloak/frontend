name: build
on:
  push:
    branches:
      - feature/*
      - feat/*
      - "!feat/workspace"

env:
  APP_NAME: frontend
  ENVIRONMENT: develop
  NODE_VERSION: 23.x
  NODE_OPTIONS: "--max_old_space_size=6144"
  VITE_APP: "frontend"
  VITE_SCHEMA: "https"
  VITE_URI: "nightscloak.com"
  VITE_PREFIX: "api/v1"
  VITE_CLIENT_SECRET: ""
  VITE_CLIENT_ID: ""
  VITE_PUSHER_APP_KEY: ""
  VITE_PUSHER_APP_WSS_PORT: "443"
  VITE_PUSHER_APP_WS_PORT: "80"
  VITE_PUSHER_APP_PATH: "/socket"
  VITE_DEPLOY_ENV: "development"
  VITE_SENTRY: "true"
  VITE_SENTRY_TELEMETRY: "true"
  VITE_SENTRY_SOURCE_MAPS: "true"
  VITE_REG_OPEN: "true"
  VITE_AUTH_FLOW: "auth"
  VITE_ANALYTICS_ID: ""

jobs:
  Branch:
    runs-on: ubuntu-latest

    steps:
      #Get Latest Code
      - uses: actions/checkout@v3
        with:
          submodules: 'true'
          token: ${{ secrets.CICD_PAT }}

      # Setup Yarn
      - name: Yarn Setup
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: Install Dependencies
        run: |
          yarn

      #Build
      - name: Test Build NightsCloak
        run: |
          yarn build