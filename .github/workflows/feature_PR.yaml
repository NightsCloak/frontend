name: build
on:
  push:
    branches:
      - feature/*
      - feat/*
      - "!feat/workspace"

env:
  APP_NAME: "Frontend"
  ENVIRONMENT: "feature"
  NODE_VERSION: 23.x
  NODE_OPTIONS: "--max_old_space_size=4096"
  VITE_SCHEMA: "https"
  VITE_URI: "intract.dev"
  VITE_PREFIX: "api/v1"
  VITE_CLIENT_SECRET: "6Yr0widLfM0QTLIJua7ooUREqPOOdeZwKYR4lQmz"
  VITE_CLIENT_ID: "9545aa14-48f1-49bf-8835-552e3a63e9de"
  VITE_STRIPE_PK: "pk_test_51OK4TCLpmBnJBh8WjK8NGIuQsPaR58tLUbL6KF79OW3puFOjqLRxOMyNaBO5hc4nacrRH7diPZ4NoXgzwVv0BDxE00UNLkuZl3"
  VITE_PUSHER_APP_KEY: "YmV0YS5pbnRyYWN0LmRldg"
  VITE_PUSHER_APP_WSS_PORT: "443"
  VITE_PUSHER_APP_WS_PORT: "80"
  VITE_PUSHER_APP_PATH: "/socket"
  VITE_DEPLOY_ENV: "development"
  VITE_SENTRY: "true"
  VITE_SENTRY_TELEMETRY: "true"
  VITE_SENTRY_SOURCE_MAPS: "true"
  VITE_REG_OPEN: "true"
  VITE_ANALYTICS_ID: "G-NR826HGLJP"

jobs:
  Branch:
    runs-on: ubuntu-latest

    steps:
      #Get Latest Code
      - uses: actions/checkout@v3
        with:
          submodules: 'true'
          token: ${{ secrets.CICD_PAT }}

      # Setup Yarn
      - name: Yarn Setup
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: Install Dependencies
        run: |
          yarn

      #Build
      - name: Build Intract Base
        run: |
          yarn workspace @intractinc/base build

      #Build
      - name: Build App
        run: |
          yarn build