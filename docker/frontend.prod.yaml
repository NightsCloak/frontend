apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: prod
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      tolerations:
        - key: sku
          value: prod
          operator: Equal
          effect: NoSchedule
      containers:
        - name: admin
          image: 573377737753.dkr.ecr.us-east-1.amazonaws.com/intract/admin:prod-${COMMIT}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf
            - name: storage-blob
              mountPath: /var/www/storage/app
            - name: std-storage-blob
              mountPath: /var/www/html/storage/standard
          livenessProbe:
            httpGet:
              port: 80
              path: /healthz
            periodSeconds: 4
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 40" ]
      volumes:
        - name: config
          configMap:
            name: intract
        - name: storage-blob
          persistentVolumeClaim:
            claimName: pvc-prod
        - name: std-storage-blob
          persistentVolumeClaim:
            claimName: std-pvc-prod
      terminationGracePeriodSeconds: 70
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: prod
spec:
  type: NodePort
  ports:
    - port: 80
  selector:
    app: admin
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: prod
  name: prod-admin-alb-ingress
  annotations:
    alb.ingress.kubernetes.io/load-balancer-name: intract-prod-admin-alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:573377737753:certificate/35a43a9a-8e1d-4228-848e-28699b3cf0a1
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: admin
                port:
                  number: 80
