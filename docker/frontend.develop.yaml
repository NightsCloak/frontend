apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nc-develop
spec:
  replicas: 5
  strategy:
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 990860969901.dkr.ecr.us-east-1.amazonaws.com/nightscloak/frontend:develop-2388fff9c9a2635a41fdc47022b4ce266fca71b5
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: storage-nfs
              mountPath: /var/www/storage
          livenessProbe:
            httpGet:
              port: 80
              path: /healthz
            periodSeconds: 4
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 40" ]
      volumes:
        - name: nginx-config
          configMap:
            name: nginx
        - name: storage-nfs
          nfs:
            server: 192.168.20.55
            path: "/mnt/nfs/nc/develop"
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: aws
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: nc-develop
spec:
  ports:
    - port: 80
  selector:
    app: frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: develop-ingress
  namespace: nc-develop
  annotations:
    cert-manager.io/issuer: letsencrypt
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.org/proxy-connect-timeout: "30s"
    nginx.org/proxy-read-timeout: "20s"
    use-proxy-protocol: "true"
    use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/server-snippet: |
      client_max_body_size 50M;
      gzip on;
      gzip_disable "MSIE [1-6]\.";
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 5;
      gzip_min_length 512;
      gzip_buffers 16 128k;
      gzip_http_version 1.1;
      gzip_types
          text/plain
          text/css
          text/js
          text/xml
          text/javascript
          application/javascript
          application/x-javascript
          application/json
          application/xml
          application/rss+xml
          image/svg+xml
          image/x-icon
          image/bmp;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nightscloak.dev
        - www.nightscloak.dev
      secretName: nc-dev-cert
  rules:
    - host: nightscloak.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80